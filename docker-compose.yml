services:
  postgres:
    image: postgres:15-alpine
    container_name: bartal-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-bartal}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-bartal_dev_pw}
      POSTGRES_DB: ${POSTGRES_DB:-bartal_dev}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - bartal_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-bartal} -d ${POSTGRES_DB:-bartal_dev}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: bartal-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - bartal_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  bartal_postgres_data:
  bartal_redis_data:
